services:
  postgres:
    image: postgres:16-alpine
    container_name: scrambleiq-api-integration-db
    environment:
      POSTGRES_USER: scrambleiq
      POSTGRES_PASSWORD: scrambleiq
      POSTGRES_DB: scrambleiq_test
    ports:
      - '55432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U scrambleiq -d scrambleiq_test']
      interval: 2s
      timeout: 2s
      retries: 30
